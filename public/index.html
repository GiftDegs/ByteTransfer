<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ByteTransfer | Cotizador Público</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brandBlue: "#1F6BFF",
            brandTeal: "#13E6C6",
          },
          fontFamily: {
            sans: ["Poppins", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script type="module" src="src/main.js" defer></script>

  <style>
    body {
      font-family: "Poppins", system-ui, sans-serif;
    }

    @keyframes btloader {
      0% { transform: translateX(-120%); }
      50% { transform: translateX(20%); }
      100% { transform: translateX(120%); }
    }

    .animate-btloader {
      animation: btloader 1.2s ease-in-out infinite;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .ripple-button {
      position: relative;
      overflow: hidden;
    }

    .ripple-button span {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      background: rgba(255, 255, 255, 0.4);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }
  </style>
</head>

<body class="min-h-[100dvh] overflow-hidden bg-[radial-gradient(circle_at_top_left,rgba(47,140,255,0.22),transparent_34%),radial-gradient(circle_at_bottom_right,rgba(34,211,197,0.18),transparent_32%),linear-gradient(180deg,#eaf6ff_0%,#f7fbff_42%,#f5e7ef_100%)] text-slate-900 sm:overflow-y-auto">
  <div
    id="splash"
    class="fixed inset-0 z-[100] flex items-center justify-center bg-white transition-opacity duration-500 opacity-100"
  >
    <div class="flex flex-col items-center gap-4">
      <img src="logo.png" alt="Logo ByteTransfer" class="h-16 select-none" />

      <div class="mt-2 h-1.5 w-40 overflow-hidden rounded-full bg-slate-200/80">
        <div class="h-full w-2/5 rounded-full bg-[linear-gradient(135deg,#22d3c5,#2f8cff)] animate-btloader"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const splash = document.getElementById("splash");
      if (!splash) return;

      const minVisibleMs = 700;
      const maxWaitMs = 1400;
      const fadeMs = 500;
      const shownAt = Date.now();
      let hidden = false;

      function hideSplash() {
        if (hidden) return;
        hidden = true;
        splash.style.opacity = "0";

        setTimeout(function () {
          splash.style.display = "none";
        }, fadeMs);
      }

      const fallback = setTimeout(function () {
        const spent = Date.now() - shownAt;
        const remain = Math.max(0, minVisibleMs - spent);
        setTimeout(hideSplash, remain);
      }, maxWaitMs);

      window.addEventListener("load", function () {
        clearTimeout(fallback);
        const spent = Date.now() - shownAt;
        const remain = Math.max(0, minVisibleMs - spent);
        setTimeout(hideSplash, remain);
      });
    })();
  </script>

  <main
    id="app"
    class="h-[100dvh] w-full overflow-hidden px-0 py-0 sm:min-h-[100svh] sm:h-auto sm:overflow-y-auto sm:px-4 sm:py-6 lg:px-8"
  >
    <div class="h-full w-full sm:h-auto sm:max-w-[860px] sm:mx-auto">
      <div id="quoteApp" class="h-full w-full sm:h-auto"></div>
    </div>
  </main>
</body>
</html>
